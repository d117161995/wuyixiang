server {
    listen       8080;
    server_name  _;
    charset      utf-8;

    location = /_auth_check {
        internal;
        proxy_pass http://172.26.164.81:8101/api/auth/nginx-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Auth-Service "wuyixiang";
    }


    location / {
        auth_request /_auth_check;
        error_page 401 = @login_redirect;
        error_page 403 = @login_redirect;

        root   "Y:/tmp/WuYiXiang/wuyixiang";
        index  index.html index.htm;
        autoindex on;
    }

    location @login_redirect {
        return 302 https://auth.dsworks.cn/login?service=wuyixiang&redirect=https://xd-cinema.dsworks.cn$request_uri;
    }

 
    location /ROstory/ {
        alias "Y:/tmp/WuYiXiang/ROstory/";
        autoindex on;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

  
    location /sence/ {
        alias "Y:/tmp/WuYiXiang/XXD_AI/Asset/Sence/";
        autoindex on;
    }

    location /town-videos/ {
        alias "Y:/tmp/liujiabao/XXD/??????/????/";
        autoindex on;
    }

    location /thumb/ {
        alias "Y:/tmp/WuYiXiang/XXD_AI/Asset/Sence/";
    }

    location /TorchCharLib/ {
        root "Y:/tmp/WuYiXiang/wuyixiang";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location /x-drive/ {
        alias "X:/";
        autoindex on;
        types {
            image/png                 png;
            image/jpeg                jpg jpeg;
            image/webp                webp;
            image/bmp                 bmp;
            image/gif                 gif;
            image/tiff                tif tiff;
            video/mp4                 mp4;
            video/quicktime           mov;
            video/webm                webm;
            application/octet-stream  fbx ma mb;
        }
        add_header Access-Control-Allow-Origin *;
    }

    location /api/seedance- {
        proxy_pass http://127.0.0.1:9097;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 100m;
    }

    location /seedance-videos/ {
        proxy_pass http://127.0.0.1:9097;
        proxy_set_header Host $host;
    }

    location /seedance-uploads/ {
        proxy_pass http://127.0.0.1:9097;
        proxy_set_header Host $host;
    }

    location /noodle-anime/ {
        alias "Y:/tmp/root/noodle-anime/";
        autoindex on;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location /sea-cg/ {
        alias "Y:/tmp/root/sea-cg/";
        autoindex on;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location /sd2/ {
        alias "Y:/tmp/root/sd2/";
        autoindex on;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location /api/sd2- {
        proxy_pass http://127.0.0.1:9097;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 100m;
    }

    location /sd2-videos/ {
        proxy_pass http://127.0.0.1:9097;
        proxy_set_header Host $host;
    }

    location /sd2-uploads/ {
        proxy_pass http://127.0.0.1:9097;
        proxy_set_header Host $host;
    }

    location /SausageComicDB/api/ {
        proxy_pass http://172.26.163.89:9090/api/;
        proxy_set_header Host $host;
        client_max_body_size 2048m;
    }

    location /SausageComicDB/ {
        alias "Y:/tmp/wangchangliang/SausageComicDB/";
        autoindex on;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location /sausage-assets/ {
        alias "Y:/tmp/wangchangliang/??????/";
        autoindex on;
        types {
            image/png                 png;
            image/jpeg                jpg jpeg;
            video/mp4                 mp4;
            application/pdf           pdf;
            application/vnd.openxmlformats-officedocument.wordprocessingml.document docx;
        }
    }

    location /local-videos/ {
        alias "Y:/???????/";
        autoindex on;
        types {
            video/mp4       mp4;
            video/quicktime mov;
            video/webm      webm;
        }
    }
}
