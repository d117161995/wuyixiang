<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>影视作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portfolio.css" id="main-css" />
  <script>document.getElementById('main-css').href='portfolio.css?t='+Date.now();</script>
</head>
<body>

  <!-- ═══ Top Bar ═══ -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-icon"><img src="../FilmCreativityGroup/assets/logo/发行商Logo.png" alt="Logo" style="width:100%;height:100%;object-fit:contain;"></span>
      <h1 class="brand-title">心动美术支撑·影视作品集</h1>
    </div>
    <div class="topbar-stats" id="topbar-stats"></div>
  </header>

  <!-- ═══ Update Log (hidden) ═══ -->
  <div class="update-log" id="update-log" style="display:none;"></div>

  <!-- ═══ Filter Bar ═══ -->
  <nav class="filterbar" id="filterbar">
    <div class="filter-row">
      <div class="filter-section">
        <label class="filter-label">游戏</label>
        <div class="filter-chips" id="filter-game"></div>
        <select class="filter-select" id="select-game"><option value="">全部游戏</option></select>
      </div>
      <div class="filter-section filter-section--search">
        <input type="text" class="search-input" id="search-input" placeholder="搜索项目名称..." />
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-section">
        <label class="filter-label">类别</label>
        <div class="filter-chips" id="filter-category"></div>
        <select class="filter-select" id="select-category"><option value="">全部类别</option></select>
      </div>
      <div class="filter-section" style="display:none;">
        <label class="filter-label">难度</label>
        <div class="filter-chips" id="filter-difficulty"></div>
      </div>
      <div class="check-dropdown" id="check-dropdown">
        <button class="check-toggle" id="check-toggle">资源检查 ▾</button>
        <div class="check-panel" id="check-panel">
          <div class="filter-chips" id="filter-missing">
            <button class="chip chip--warn" data-missing="video">缺视频</button>
            <button class="chip chip--warn" data-missing="cover">缺封面</button>
            <button class="chip chip--warn" data-missing="category">缺分类</button>
            <button class="chip chip--warn" data-missing="difficulty" style="display:none;">缺难度</button>
          </div>
        </div>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-section">
        <label class="filter-label">生产方式</label>
        <div class="filter-chips" id="filter-production"></div>
        <select class="filter-select" id="select-production"><option value="">全部方式</option></select>
      </div>
    </div>
  </nav>

  <!-- ═══ Main Content ═══ -->
  <main class="content" id="content">
    <!-- Game sections rendered by JS -->
  </main>

  <!-- ═══ Detail Modal ═══ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="关闭">&times;</button>

      <div class="modal-media" id="modal-media">
        <!-- Video or cover image rendered by JS -->
      </div>

      <div class="modal-body">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-tags" id="modal-tags"></div>
        <div class="modal-links" id="modal-links"></div>
        <div class="modal-details" id="modal-details"></div>
      </div>
    </div>
  </div>

  <!-- ═══ Back to top ═══ -->
  <button class="back-to-top" id="back-to-top" aria-label="回到顶部">↑</button>

  <script>
    (function(){
      var t = Date.now();
      function load(src){
        var s = document.createElement('script');
        s.src = src + '?t=' + t;
        s.async = false;
        document.body.appendChild(s);
      }
      load('portfolio-db.data.js');
      load('portfolio.js');
    })();
  </script>
</body>
</html>
