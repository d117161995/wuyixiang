<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maya Bridge - 网页控制面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#0d1117;--surface:#161b22;--border:#30363d;--border-light:#484f58;
    --text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;--accent-glow:rgba(88,166,255,.15);
    --green:#3fb950;--red:#f85149;--orange:#d29922;--purple:#bc8cff;
    --radius:10px;--mono:'Consolas','Courier New',monospace;
}
html,body{height:100%;font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text)}

/* ── 布局 ── */
.app{display:grid;grid-template-columns:320px 1fr;grid-template-rows:56px 1fr;height:100vh}
.header{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:0 24px;
    background:var(--surface);border-bottom:1px solid var(--border);z-index:10}
.sidebar{grid-row:2;display:flex;flex-direction:column;gap:12px;padding:16px;
    background:var(--surface);border-right:1px solid var(--border);overflow-y:auto}
.main{grid-row:2;display:flex;flex-direction:column;overflow:hidden}

/* ── 头部 ── */
.header h1{font-size:18px;font-weight:600;letter-spacing:.5px}
.header h1 span{color:var(--accent)}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;
    transition:background .3s,box-shadow .3s}
.status-dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.off{background:var(--red);box-shadow:0 0 8px var(--red)}
.status-text{font-size:13px;color:var(--text-dim)}
.header-actions{margin-left:auto;display:flex;gap:8px}

/* ── 按钮 ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
    border:1px solid var(--border);border-radius:6px;background:var(--surface);
    color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{border-color:var(--accent);background:var(--accent-glow)}
.btn:active{transform:scale(.97)}
.btn.primary{background:rgba(88,166,255,.15);border-color:var(--accent);color:var(--accent)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:rgba(248,81,73,.1)}
.btn.sm{padding:5px 10px;font-size:12px}

/* ── 侧边栏 ── */
.panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-header{display:flex;align-items:center;gap:8px;padding:10px 14px;
    font-size:13px;font-weight:600;color:var(--text-dim);border-bottom:1px solid var(--border);
    text-transform:uppercase;letter-spacing:1px}
.panel-header svg{width:14px;height:14px;stroke:var(--text-dim);fill:none;stroke-width:2}
.panel-body{padding:10px}

.quick-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;
    border:1px solid var(--border);border-radius:8px;background:var(--surface);
    color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;text-align:left}
.quick-btn:hover{border-color:var(--accent);background:var(--accent-glow);transform:translateX(4px)}
.quick-btn .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;font-size:16px;flex-shrink:0}
.quick-btn .icon.blue{background:rgba(88,166,255,.15)}
.quick-btn .icon.green{background:rgba(63,185,80,.15)}
.quick-btn .icon.orange{background:rgba(210,153,34,.15)}
.quick-btn .icon.purple{background:rgba(188,140,255,.15)}
.quick-btn .icon.red{background:rgba(248,81,73,.15)}
.quick-btn .label{font-weight:500}
.quick-btn .desc{font-size:11px;color:var(--text-dim);margin-top:2px}

.scene-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.info-item{padding:8px 10px;background:var(--surface);border-radius:6px;border:1px solid var(--border)}
.info-item .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.info-item .value{font-size:14px;font-weight:600;margin-top:2px;font-family:var(--mono)}

/* ── 主内容区 ── */
.editor-area{flex:1;display:flex;flex-direction:column;padding:16px;gap:12px;overflow:hidden}
.code-wrap{flex:1;display:flex;flex-direction:column;border:1px solid var(--border);
    border-radius:var(--radius);overflow:hidden;min-height:0}
.code-toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;
    background:var(--surface);border-bottom:1px solid var(--border)}
.code-toolbar .lang-tag{font-size:11px;padding:3px 8px;border-radius:4px;
    background:rgba(188,140,255,.15);color:var(--purple);font-weight:600}
.code-editor{flex:1;resize:none;border:none;background:var(--bg);color:var(--text);
    font-family:var(--mono);font-size:14px;line-height:1.7;padding:16px;outline:none;
    tab-size:4;min-height:120px}
.code-editor::placeholder{color:var(--border-light)}

.output-wrap{height:220px;min-height:100px;display:flex;flex-direction:column;
    border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.output-toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;
    background:var(--surface);border-bottom:1px solid var(--border)}
.output-toolbar .label{font-size:12px;color:var(--text-dim);font-weight:600}
.output{flex:1;padding:12px 16px;font-family:var(--mono);font-size:13px;line-height:1.6;
    overflow-y:auto;white-space:pre-wrap;word-break:break-all;color:var(--text-dim);background:var(--bg)}
.output .line{margin-bottom:2px}
.output .line.error{color:var(--red)}
.output .line.success{color:var(--green)}
.output .line.info{color:var(--accent)}
.output .line.warn{color:var(--orange)}

/* ── 历史 ── */
.history-list{max-height:200px;overflow-y:auto}
.history-item{padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--text-dim);
    border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-item:hover{background:var(--accent-glow);color:var(--text)}

/* ── 滚动条 ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}

/* ── 响应式 ── */
@media(max-width:900px){
    .app{grid-template-columns:1fr;grid-template-rows:56px auto 1fr}
    .sidebar{grid-row:2;border-right:none;border-bottom:1px solid var(--border);
        flex-direction:row;flex-wrap:wrap;max-height:160px;overflow-y:auto}
    .panel{min-width:260px}
    .main{grid-row:3}
}
</style>
</head>
<body>

<div class="app">
    <!-- 头部 -->
    <header class="header">
        <h1>Maya <span>Bridge</span></h1>
        <div class="status-dot off" id="statusDot"></div>
        <span class="status-text" id="statusText">未连接 Maya</span>
        <div class="header-actions">
            <button class="btn sm" onclick="pingMaya()">🔍 检测连接</button>
            <button class="btn sm" onclick="refreshScene()">🔄 刷新场景</button>
        </div>
    </header>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <!-- 快捷命令 -->
        <div class="panel" style="flex:1">
            <div class="panel-header">
                <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                快捷命令
            </div>
            <div class="panel-body" style="display:flex;flex-direction:column;gap:6px">
                <button class="quick-btn" onclick="quickCmd('cmds.newScene')">
                    <div class="icon blue">📄</div>
                    <div><div class="label">新建场景</div><div class="desc">创建空白场景</div></div>
                </button>
                <button class="quick-btn" onclick="quickCmd('cmds.listObjects')">
                    <div class="icon green">📋</div>
                    <div><div class="label">列出对象</div><div class="desc">列出场景中所有 transform 节点</div></div>
                </button>
                <button class="quick-btn" onclick="quickCmd('cmds.createCube')">
                    <div class="icon orange">📦</div>
                    <div><div class="label">创建方块</div><div class="desc">创建一个 polyCube</div></div>
                </button>
                <button class="quick-btn" onclick="quickCmd('cmds.createSphere')">
                    <div class="icon purple">🔮</div>
                    <div><div class="label">创建球体</div><div class="desc">创建一个 polySphere</div></div>
                </button>
                <button class="quick-btn" onclick="quickCmd('cmds.playblast')">
                    <div class="icon red">🎬</div>
                    <div><div class="label">拍屏预览</div><div class="desc">Playblast 当前视角</div></div>
                </button>
                <button class="quick-btn" onclick="quickCmd('cmds.getSelection')">
                    <div class="icon blue">🎯</div>
                    <div><div class="label">获取选择</div><div class="desc">打印当前选中的对象</div></div>
                </button>
                <button class="quick-btn" onclick="quickCmd('cmds.getTimeRange')">
                    <div class="icon green">⏱️</div>
                    <div><div class="label">时间范围</div><div class="desc">获取时间线起止帧</div></div>
                </button>
                <button class="quick-btn" onclick="quickCmd('cmds.saveScene')">
                    <div class="icon orange">💾</div>
                    <div><div class="label">保存场景</div><div class="desc">保存当前场景文件</div></div>
                </button>
            </div>
        </div>

        <!-- 场景信息 -->
        <div class="panel">
            <div class="panel-header">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                场景信息
            </div>
            <div class="scene-info" id="sceneInfo">
                <div class="info-item"><div class="label">文件</div><div class="value" id="infoFile">-</div></div>
                <div class="info-item"><div class="label">对象数</div><div class="value" id="infoCount">-</div></div>
                <div class="info-item"><div class="label">帧范围</div><div class="value" id="infoFrames">-</div></div>
                <div class="info-item"><div class="label">FPS</div><div class="value" id="infoFps">-</div></div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="panel">
            <div class="panel-header">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                历史记录
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </aside>

    <!-- 主编辑区 -->
    <div class="main">
        <div class="editor-area">
            <div class="code-wrap">
                <div class="code-toolbar">
                    <span class="lang-tag">Python</span>
                    <span style="font-size:12px;color:var(--text-dim)">发送 Python 代码到 Maya</span>
                    <div style="margin-left:auto;display:flex;gap:6px">
                        <button class="btn sm primary" onclick="runCode()">▶ 执行 (Ctrl+Enter)</button>
                        <button class="btn sm" onclick="clearEditor()">清空</button>
                    </div>
                </div>
                <textarea class="code-editor" id="codeEditor" 
                    placeholder="# 输入 Maya Python 代码...&#10;# 例如:&#10;import maya.cmds as cmds&#10;cmds.polyCube()&#10;&#10;# 按 Ctrl+Enter 执行"
                    spellcheck="false"></textarea>
            </div>
            <div class="output-wrap">
                <div class="output-toolbar">
                    <span class="label">📤 输出</span>
                    <div style="margin-left:auto">
                        <button class="btn sm danger" onclick="clearOutput()">清空</button>
                    </div>
                </div>
                <div class="output" id="output">
                    <div class="line info">Maya Bridge 就绪 — 请确保 Maya 已开启 commandPort</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const WS_URL = `ws://${location.host}`;
let ws = null;
let msgId = 0;
let history = [];

const cmds = {
    newScene:     'import maya.cmds as cmds\ncmds.file(new=True, force=True)\nprint("新场景已创建")',
    listObjects:  'import maya.cmds as cmds\nobjs = cmds.ls(type="transform")\nprint("\\n".join(objs) if objs else "场景为空")',
    createCube:   'import maya.cmds as cmds\nresult = cmds.polyCube()\nprint("已创建:", result[0])',
    createSphere: 'import maya.cmds as cmds\nresult = cmds.polySphere()\nprint("已创建:", result[0])',
    playblast:    'import maya.cmds as cmds\nf = cmds.playblast(format="image", sequenceTime=0, clearCache=1, viewer=1, fp=0, percent=100, compression="png", quality=100, widthHeight=[1920,1080])\nprint("Playblast:", f)',
    getSelection: 'import maya.cmds as cmds\nsel = cmds.ls(selection=True)\nprint("选中:", sel if sel else "无")',
    getTimeRange: 'import maya.cmds as cmds\ns = cmds.playbackOptions(q=True, min=True)\ne = cmds.playbackOptions(q=True, max=True)\nprint(f"时间范围: {int(s)} - {int(e)}")',
    saveScene:    'import maya.cmds as cmds\nf = cmds.file(save=True)\nprint("已保存:", f)',
};

const sceneInfoCode = `import maya.cmds as cmds
import json
info = {}
info['file'] = cmds.file(q=True, sceneName=True) or 'untitled'
info['count'] = len(cmds.ls(type='transform') or [])
s = cmds.playbackOptions(q=True, min=True)
e = cmds.playbackOptions(q=True, max=True)
info['frames'] = f'{int(s)}-{int(e)}'
info['fps'] = cmds.currentUnit(q=True, time=True)
print('__SCENE_INFO__' + json.dumps(info))`;

function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => appendOutput('WebSocket 已连接到服务器', 'info');

    ws.onmessage = e => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'status') updateStatus(msg.connected);
        if (msg.type === 'result') handleResult(msg);
        if (msg.type === 'error') appendOutput('错误: ' + msg.error, 'error');
    };

    ws.onclose = () => {
        updateStatus(false);
        appendOutput('WebSocket 断开，3秒后重连...', 'warn');
        setTimeout(connect, 3000);
    };

    ws.onerror = () => {};
}

function updateStatus(connected) {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className = 'status-dot ' + (connected ? 'on' : 'off');
    text.textContent = connected ? '已连接 Maya ✓' : '未连接 Maya';
}

function send(code, id) {
    if (!ws || ws.readyState !== 1) {
        appendOutput('未连接到服务器', 'error');
        return;
    }
    id = id || ++msgId;
    ws.send(JSON.stringify({ type: 'exec', code, id }));
}

function handleResult(msg) {
    const text = msg.result || '(无返回)';
    if (text.includes('__SCENE_INFO__')) {
        const json = text.split('__SCENE_INFO__')[1];
        try {
            const info = JSON.parse(json);
            document.getElementById('infoFile').textContent = info.file.split('/').pop() || 'untitled';
            document.getElementById('infoCount').textContent = info.count;
            document.getElementById('infoFrames').textContent = info.frames;
            document.getElementById('infoFps').textContent = info.fps;
        } catch {}
        return;
    }
    appendOutput(text, 'success');
}

function appendOutput(text, cls) {
    const out = document.getElementById('output');
    const div = document.createElement('div');
    div.className = 'line ' + (cls || '');
    const now = new Date();
    const ts = `[${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}]`;
    div.textContent = ts + ' ' + text;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
}

function runCode() {
    const editor = document.getElementById('codeEditor');
    const code = editor.value.trim();
    if (!code) return;
    appendOutput('>>> ' + code.split('\n')[0] + (code.includes('\n') ? ' ...' : ''), 'info');
    send(code);
    addHistory(code);
}

function clearEditor() {
    document.getElementById('codeEditor').value = '';
}

function clearOutput() {
    document.getElementById('output').innerHTML = '';
}

function quickCmd(key) {
    const parts = key.split('.');
    const code = cmds[parts[1]];
    if (!code) return;
    document.getElementById('codeEditor').value = code;
    appendOutput('>>> [快捷] ' + code.split('\n')[0] + ' ...', 'info');
    send(code);
    addHistory(code);
}

function addHistory(code) {
    history.unshift(code);
    if (history.length > 30) history.pop();
    renderHistory();
}

function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = history.map((c, i) =>
        `<div class="history-item" onclick="loadHistory(${i})">${c.split('\n')[0]}</div>`
    ).join('');
}

function loadHistory(i) {
    document.getElementById('codeEditor').value = history[i];
}

function pingMaya() {
    if (!ws || ws.readyState !== 1) {
        appendOutput('未连接到服务器', 'error');
        return;
    }
    ws.send(JSON.stringify({ type: 'ping' }));
    appendOutput('正在检测 Maya 连接...', 'info');
}

function refreshScene() {
    send(sceneInfoCode);
    appendOutput('正在获取场景信息...', 'info');
}

document.getElementById('codeEditor').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        runCode();
    }
    if (e.key === 'Tab') {
        e.preventDefault();
        const ta = e.target;
        const start = ta.selectionStart;
        ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = start + 4;
    }
});

connect();
</script>
</body>
</html>
