
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       8080;
        server_name  localhost;
        charset      utf-8;

        # 1. 项目主目录 (Workspace)
        # 访问地址: http://localhost:8080/story/noodle-anime-plan.html
        location / {
            root   "Y:/tmp/WuYiXiang/wuyixiang";
            index  index.html index.htm;
            autoindex on;
        }

        # 2. 场景库图片映射 (External Assets)
        # 对应 scene-db.data.js 里的 /sence/ 路径
        location /sence/ {
            alias "Y:/tmp/WuYiXiang/XXD_AI/Asset/Sence/";
            autoindex on;
        }

        # 3. 小镇视频资源 (刘佳宝收集)
        location /town-videos/ {
            alias "Y:/tmp/liujiabao/XXD/收集视频/小镇/";
            autoindex on;
        }

        # 4. 缩略图兼容 (直接返回原图，因为 Windows Nginx 通常无 image_filter)
        location /thumb/ {
            alias "Y:/tmp/WuYiXiang/XXD_AI/Asset/Sence/";
        }
    }
}
